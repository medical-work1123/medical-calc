<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>内科・呼吸器科 ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;display:flex;flex-direction:column;}
header{background:#1a6fb5;color:#fff;padding:18px 20px;box-shadow:0 2px 8px rgba(26,111,181,.3);}
header h1{font-size:22px;font-weight:700;}
header p{font-size:13px;opacity:.75;margin-top:3px;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:640px;width:100%;}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.1);padding:36px 24px;text-align:center;text-decoration:none;color:#1e293b;transition:transform .15s,box-shadow .15s;cursor:pointer;}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(0,0,0,.15);}
.card-icon{font-size:52px;margin-bottom:16px;}
.card-title{font-size:18px;font-weight:800;color:#1a6fb5;margin-bottom:8px;}
.card-desc{font-size:13px;color:#64748b;line-height:1.6;}
@media(max-width:480px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <h1>内科・呼吸器科 ツール</h1>
  <p>医療計算・オンコール管理</p>
</header>
<main>
  <div class="grid">
    <a href="calc.html" class="card">
      <div class="card-icon">🧮</div>
      <div class="card-title">医療計算</div>
      <div class="card-desc">腎機能・肝機能・糖尿病・電解質・感染症など各種計算ツール</div>
    </a>
    <a href="oncall.html" class="card">
      <div class="card-icon">🏥</div>
      <div class="card-title">オンコール表</div>
      <div class="card-desc">内科・呼吸器科の待機医師票</div>
    </a>
  </div>
</main>
</body>
</html>
