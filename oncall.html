<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>内科・呼吸器科 待機医師票</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;padding-bottom:40px;}
header{background:#1a6fb5;color:#fff;padding:14px 20px 12px;box-shadow:0 2px 8px rgba(26,111,181,.3);display:flex;align-items:center;gap:12px;}
header a{color:rgba(255,255,255,.75);text-decoration:none;font-size:14px;}
header a:hover{color:#fff;}
header h1{font-size:20px;font-weight:700;}
main{max-width:600px;margin:0 auto;padding:24px 16px;}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;}
.card-title{font-size:18px;font-weight:700;color:#1a6fb5;margin-bottom:6px;}
.updated{font-size:12px;color:#64748b;margin-bottom:20px;}
.entry{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #e2e8f0;}
.entry:last-child{border-bottom:none;}
.entry-date{width:130px;font-size:15px;font-weight:700;color:#1e293b;}
.entry-doctor{font-size:17px;font-weight:800;color:#1a6fb5;}
.empty{color:#64748b;font-size:14px;padding:20px 0;}
.back{display:inline-block;margin-top:20px;padding:10px 20px;background:#1a6fb5;color:#fff;border-radius:10px;text-decoration:none;font-weight:700;}
</style>
</head>
<body>
<header>
  <a href="index.html">← トップ</a>
  <h1>🏥 内科・呼吸器科 待機医師票</h1>
</header>
<main>
  <div class="card">
    <div class="card-title" id="oncall-title">待機医師票</div>
    <div class="updated" id="oncall-updated"></div>
    <div id="month-picker" style="display:none;margin-bottom:18px;">
      <label for="month-select" style="font-size:14px;color:#475569;font-weight:700;margin-right:8px;">月を選択：</label>
      <select id="month-select" style="font-size:15px;padding:6px 10px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;"></select>
    </div>
    <div id="oncall-list"></div>
    <div class="empty" id="oncall-empty" style="display:none">データがまだ公開されていません。</div>
  </div>
  <a href="index.html" class="back">← トップに戻る</a>
</main>
<script>
function render(rec){
  document.getElementById('oncall-title').textContent=(rec&&rec.title)||'待機医師票';
  document.getElementById('oncall-updated').textContent=(rec&&rec.updated)?'更新日：'+rec.updated:'';
  const list=document.getElementById('oncall-list');
  const empty=document.getElementById('oncall-empty');
  if(rec&&rec.entries&&rec.entries.length>0){
    empty.style.display='none';
    list.innerHTML=rec.entries.map(e=>
      `<div class="entry">
        <span class="entry-date">${e.date}</span>
        <span class="entry-doctor">${e.doctor}</span>
       </div>`
    ).join('');
  }else{
    list.innerHTML='';
    empty.style.display='block';
  }
}
fetch('oncall.json?_='+Date.now())
  .then(r=>r.ok?r.json():Promise.reject())
  .then(d=>{
    const months=d.months;
    if(months&&Object.keys(months).length>0){
      const keys=Object.keys(months).sort().reverse();   // 新しい月が上
      const sel=document.getElementById('month-select');
      sel.innerHTML=keys.map(k=>{
        const p=k.split('-');
        return `<option value="${k}">${parseInt(p[0],10)}年${parseInt(p[1],10)}月</option>`;
      }).join('');
      const cur=(d.current&&months[d.current])?d.current:keys[0];
      sel.value=cur;
      document.getElementById('month-picker').style.display='block';
      sel.addEventListener('change',()=>render(months[sel.value]));
      render(months[cur]);
    }else{
      render(d);   // 旧・単月形式との互換
    }
  })
  .catch(()=>{document.getElementById('oncall-empty').style.display='block';});
</script>
</body>
</html>
